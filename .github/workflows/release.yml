name: Release

# Title each run with the prefixed tag being published (e.g. "Release ·
# erli18n-v0.5.0") instead of a bare "Release". (GitHub Actions "run-name".)
run-name: Release · ${{ inputs.tag || github.ref_name }}

# Tag-triggered publish to Hex.pm for the erli18n umbrella, which ships TWO
# packages from this one repo:
#
#   - erli18n          (apps/erli18n,         the runtime library)
#   - rebar3_erli18n   (apps/rebar3_erli18n,  the rebar3 plugin)
#
# ONE parameterized workflow publishes EITHER package, keyed off a per-package
# PREFIXED tag and a per-package working directory. A single data-driven body
# (resolve APP from the tag prefix, then `cd apps/$APP` for the build/publish/doc
# steps) keeps the logic identical for both packages — the data-driven,
# one-workflow approach used by multi-package Erlang/Elixir umbrellas.
#
# Why publish FROM the app directory (cd apps/$APP) rather than `--app NAME` from
# the umbrella root: the published `requirements` are built from the LOCK, not
# from `{deps}`. rebar3_hex's create_package reads `LockDeps = rebar_state:get(
# State, {locks, default}, [])` (rebar3_hex_build.erl:369), keeps only level-0
# `{pkg,...}` lock entries (rebar3_hex_app.erl:43-63 get_deps/lock_to_dep), and
# update_versions/2 (rebar3_hex_build.erl:424-442) iterates those LOCK entries —
# using `{deps}` ONLY to override each requirement string. The umbrella root
# `rebar.lock` locks just `telemetry`; the sibling app `erli18n` is path-resolved
# and never appears in the root lock, so an `--app rebar3_erli18n` build FROM THE
# ROOT publishes `requirements = telemetry` and OMITS `erli18n` entirely (a
# locally-reproduced bug). Building from `apps/rebar3_erli18n/` resolves `erli18n`
# from Hex into a per-app lock as a level-0 `{pkg,...}` entry, so create_package
# emits `requirements = {erli18n, "~> 0.5"}` (telemetry demoted to a transitive
# level-1 lock and excluded). Each app carries its own `{project_plugins,
# [rebar3_hex, rebar3_ex_doc]}` so a per-app `rebar3 hex` invocation has the
# `hex`/`ex_doc` providers. This matches the exemplar
# open-telemetry/opentelemetry-erlang, which publishes each app self-contained
# from its own directory; its root lock never lists the sibling
# `opentelemetry_api`, yet published `opentelemetry` 1.7.0 lists
# `requirements = {opentelemetry_api, "~> 1.5.0"}`
# (hex.pm/api/packages/opentelemetry/releases/1.7.0).
#
# Tag scheme — per-package PREFIXED tags (both OTel repos use prefixed tags,
# e.g. opentelemetry/v1.7.0, opentelemetry_api/v1.5.0, opentelemetry-phoenix-v2.0.1):
#
#   erli18n-vX.Y.Z          -> APP=erli18n
#   rebar3_erli18n-vX.Y.Z   -> APP=rebar3_erli18n
#
# The workflow derives APP and the app.src / CHANGELOG paths from the tag prefix,
# so the validate / build / publish / release-notes logic stays identical for
# both packages (DRY), exactly the contrib model.
#
# Why a tag — not push/merge to main: Hex versions are IMMUTABLE (a published
# version can never be overwritten, only reverted within 24h). Merges to main
# happen many times per release, so publishing is gated on a deliberate version
# tag instead. The tag's version must match the `vsn` in that package's
# .app.src (checked below) so the git tag and the Hex version can never drift.
#
# PUBLISH ORDER (strict, manually gated): erli18n FIRST, then rebar3_erli18n.
# The plugin declares {erli18n, "~> 0.5"}; that requirement cannot resolve on
# hex.pm until erli18n 0.5.0 is published, and a consumer installing the plugin
# against the still-published erli18n 0.4.0 hits `undef` on
# erli18n_po:escape_string/1 (the new 0.5.0 export the plugin calls). This
# workflow does NOT auto-publish both in one run: each package is published by
# pushing ITS OWN tag, and the rebar3_erli18n-v* path carries an explicit guard
# (see "Enforce erli18n-first publish order") that fails fast if the plugin's
# required erli18n minor is not yet live on Hex. Operators publish erli18n's tag,
# confirm it is live, then publish the plugin's tag — the ordered gate the OTel
# exemplars do NOT encode (our deliberate improvement).

on:
  push:
    tags:
      - 'erli18n-v*'
      - 'rebar3_erli18n-v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing prefixed tag to publish (e.g. erli18n-v0.5.0 or rebar3_erli18n-v0.1.0). Must match that app.src vsn.'
        required: true

concurrency:
  # Never cancel an in-flight publish — a half-published release is worse than
  # a queued one. Serialize per ref (the prefixed tag identifies the package).
  group: release-${{ inputs.tag || github.ref_name }}
  cancel-in-progress: false

permissions:
  # contents: write is required to create the GitHub Release at the end. Hex
  # publishing uses HEX_API_KEY (not GITHUB_TOKEN), so this scope only empowers
  # the release-creation step — nothing else writes to the repo.
  contents: write

jobs:
  # RELEASE AUTHORIZATION GATE — runs BEFORE any Hex publish and is a hard
  # dependency of the `publish` job (`needs: authorize`). A release proceeds ONLY
  # when BOTH of these hold; either one failing fails this job and blocks publish:
  #
  #   (1) FRESH MERGE WINDOW: less than 24h elapsed between the source main PR
  #       (the one that produced this released commit) MERGING to `main` and this
  #       release event. A version tag pushed long after the code landed on main
  #       is stale and must be re-merged first — shipping must be recent relative
  #       to the merge it ships. (Maintainer APPROVAL of the publish itself is
  #       the `hex-publish` environment's required reviewer, not a PR review.)
  #
  #   (2) MAINTAINER IDENTITY: the actor triggering this release is EITHER the
  #       author of that approved PR OR an active member of the maintainers team.
  #       Releases are locked to maintainers.
  #
  # This is an ADDITIVE safeguard layered on top of the existing locks (the
  # tag-push trigger needs write access, and the `hex-publish` environment's
  # required reviewer still gates the actual Hex push). It weakens nothing: the
  # `publish` job keeps `environment: hex-publish` and every downstream check.
  #
  # Identity resolution uses the GitHub Actions context + the gh/REST API:
  #   - the released commit:        github.sha
  #   - the release actor:          github.triggering_actor
  #   - the source PR + author:     GET /repos/{repo}/commits/{sha}/pulls,
  #                                 then .user.login on the PR
  #   - the merge timestamp:        .merged_at on that PR
  #   - team membership:            GET /orgs/{org}/teams/{team}/memberships/{user}
  #
  # FAIL-CLOSED by design: the repo-scoped GITHUB_TOKEN cannot read org team
  # membership, so the team lookup uses an OPTIONAL `MAINTAINERS_TOKEN` secret (a
  # PAT / fine-grained token with `read:org`). When that secret is absent the team
  # check is treated as "not a member", so the actor must then be the approved
  # PR's author — strictly stronger, never weaker. The maintainers org/team
  # default to this repo's owner and a `maintainers` team and can be overridden
  # with the `MAINTAINERS_ORG` / `MAINTAINERS_TEAM` repository Variables.
  authorize:
    name: Authorize release
    runs-on: ubuntu-24.04
    # Read-only scopes: this gate only inspects the PR/commit metadata, it never
    # writes to the repo. (The `publish` job inherits the workflow-level
    # `contents: write` it needs for the GitHub Release.)
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Verify fresh merge window and maintainer identity
        env:
          # Repo-scoped token for the commit/PR/review lookups on THIS repo.
          GH_TOKEN: ${{ github.token }}
          # OPTIONAL read:org token used ONLY for the maintainers-team lookup.
          # Absent -> team check fails closed (actor must be the PR author).
          MAINTAINERS_TOKEN: ${{ secrets.MAINTAINERS_TOKEN }}
          REPO: ${{ github.repository }}
          SHA: ${{ github.sha }}
          ACTOR: ${{ github.triggering_actor }}
          ORG: ${{ vars.MAINTAINERS_ORG || github.repository_owner }}
          TEAM: ${{ vars.MAINTAINERS_TEAM || 'maintainers' }}
          # 24h, in seconds. The merge to main must be strictly newer than this.
          MAX_AGE_SECONDS: '86400'
        run: |
          set -euo pipefail
          FAILED=0
          fail() { echo "::error::$1"; FAILED=1; }

          echo "Release actor:      ${ACTOR}"
          echo "Release commit:     ${SHA}"
          echo "Maintainers team:   ${ORG}/${TEAM}"

          # --- Locate the approved main PR that produced this commit ----------
          # "List pull requests associated with a commit" returns the PR(s) whose
          # merge landed this commit on a branch. Keep only those merged into
          # `main` and take the most recently merged one.
          PR=$(gh api "repos/${REPO}/commits/${SHA}/pulls" \
                 --jq 'map(select(.base.ref == "main" and .merged_at != null))
                       | sort_by(.merged_at) | last | .number' 2>/dev/null || echo "")
          if [ -z "${PR}" ] || [ "${PR}" = "null" ]; then
            echo "::error::No merged pull request targeting 'main' is associated with commit ${SHA}. A release must originate from an approved main PR; refusing to publish."
            exit 1
          fi
          echo "Source PR:          #${PR}"

          PR_AUTHOR=$(gh api "repos/${REPO}/pulls/${PR}" --jq '.user.login')
          echo "PR author:          ${PR_AUTHOR}"

          # --- Check (1): the PR merged to main less than 24h ago -------------
          # The window is measured from the MERGE to main (.merged_at), not from
          # a PR review: the rule is "publish within 24h of the code landing on
          # main". (Maintainer APPROVAL of the publish is the hex-publish
          # environment's required reviewer — a separate, manual gate that a solo
          # maintainer CAN grant on their own deployment, unlike a PR self-review.)
          MERGED_AT=$(gh api "repos/${REPO}/pulls/${PR}" --jq '.merged_at' 2>/dev/null || echo "")
          if [ -z "${MERGED_AT}" ] || [ "${MERGED_AT}" = "null" ]; then
            fail "PR #${PR} has no merge timestamp; a release must originate from a PR merged into main."
          else
            MERGED_EPOCH=$(date -u -d "${MERGED_AT}" +%s)
            NOW=$(date -u +%s)
            AGE=$((NOW - MERGED_EPOCH))
            echo "PR merged at:       ${MERGED_AT} (${AGE}s ago)"
            if [ "${AGE}" -lt 0 ]; then
              fail "PR #${PR} merge timestamp ${MERGED_AT} is in the future (clock skew?); refusing to release."
            elif [ "${AGE}" -ge "${MAX_AGE_SECONDS}" ]; then
              fail "PR #${PR} merged ${AGE}s ago, which is >= ${MAX_AGE_SECONDS}s (24h). The merge is stale: publish within 24h of merging to main."
            else
              echo "Merge window OK:    ${AGE}s < ${MAX_AGE_SECONDS}s."
            fi
          fi

          # --- Check (2): the actor is the PR author OR a maintainers member --
          IS_AUTHOR=0
          if [ "${ACTOR}" = "${PR_AUTHOR}" ]; then
            IS_AUTHOR=1
          fi

          IS_MAINTAINER=0
          if [ -n "${MAINTAINERS_TOKEN:-}" ]; then
            STATE=$(GH_TOKEN="${MAINTAINERS_TOKEN}" gh api \
                      "orgs/${ORG}/teams/${TEAM}/memberships/${ACTOR}" \
                      --jq '.state' 2>/dev/null || echo "")
            if [ "${STATE}" = "active" ]; then
              IS_MAINTAINER=1
            fi
            echo "Team membership:    state='${STATE:-none}' (org ${ORG} / team ${TEAM})"
          else
            echo "Team membership:    not checked (no MAINTAINERS_TOKEN secret; org team lookup needs a read:org token). Failing closed."
          fi

          if [ "${IS_AUTHOR}" -eq 1 ]; then
            echo "Identity OK:        actor '${ACTOR}' is the author of approved PR #${PR}."
          elif [ "${IS_MAINTAINER}" -eq 1 ]; then
            echo "Identity OK:        actor '${ACTOR}' is an active member of ${ORG}/${TEAM}."
          else
            fail "Release actor '${ACTOR}' is neither the author of approved PR #${PR} ('${PR_AUTHOR}') nor an active member of the '${ORG}/${TEAM}' maintainers team. Releases are locked to maintainers."
          fi

          # --- Both checks must pass ------------------------------------------
          if [ "${FAILED}" -ne 0 ]; then
            echo "::error::Release authorization FAILED. BOTH must hold: (1) source PR #${PR} merged to main < 24h ago, AND (2) actor '${ACTOR}' is the PR author or a maintainers-team member. See the messages above."
            exit 1
          fi
          echo "Release authorization PASSED for actor '${ACTOR}' via PR #${PR}."

  publish:
    name: Publish to Hex.pm
    runs-on: ubuntu-24.04
    # Hard dependency on the authorization gate: publishing cannot start until
    # the fresh-approval + maintainer-identity checks pass.
    needs: authorize
    # The HEX_API_KEY secret lives in this environment. Declaring it here is
    # what grants access to that secret (and runs any environment protection
    # rules, e.g. required reviewers, that you configure in repo settings).
    environment: hex-publish
    steps:
      - uses: actions/checkout@v6
        with:
          # Tag push -> github.ref_name is the tag; dispatch -> the tag input.
          ref: ${{ inputs.tag || github.ref_name }}

      - name: Set up Erlang/OTP
        uses: erlef/setup-beam@v1
        with:
          otp-version: '28'
          rebar3-version: '3.24'

      # Derive APP, the package version, and the per-app .app.src / CHANGELOG
      # paths from the PREFIXED tag. The longest matching prefix wins, so
      # `rebar3_erli18n-v*` is tested before `erli18n-v*` (the plugin tag also
      # ends in `...erli18n-v*`). Everything downstream reads these outputs, so
      # the publish body is identical for both packages.
      - name: Resolve package from tag prefix
        id: pkg
        env:
          INPUT_TAG: ${{ inputs.tag }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          TAG="${INPUT_TAG:-$REF_NAME}"
          case "$TAG" in
            rebar3_erli18n-v*)
              APP=rebar3_erli18n
              VSN="${TAG#rebar3_erli18n-v}"
              ;;
            erli18n-v*)
              APP=erli18n
              VSN="${TAG#erli18n-v}"
              ;;
            *)
              echo "::error::Tag '$TAG' has no recognized package prefix. Use 'erli18n-vX.Y.Z' or 'rebar3_erli18n-vX.Y.Z'."
              exit 1
              ;;
          esac
          APP_DIR="apps/${APP}"
          {
            echo "tag=$TAG"
            echo "app=$APP"
            echo "vsn=$VSN"
            echo "app_dir=$APP_DIR"
            echo "app_src=${APP_DIR}/src/${APP}.app.src"
            echo "changelog=${APP_DIR}/CHANGELOG.md"
          } >> "$GITHUB_OUTPUT"
          echo "Resolved tag '$TAG' -> APP=$APP VSN=$VSN (dir $APP_DIR)"

      # The tag's version must equal the vsn in THAT package's .app.src, so the
      # git tag and the Hex version can never drift (generalized from the old
      # single-package check to the tag-derived app.src path).
      - name: Validate tag matches app.src vsn
        env:
          TAG: ${{ steps.pkg.outputs.tag }}
          TAG_VSN: ${{ steps.pkg.outputs.vsn }}
          APP_SRC: ${{ steps.pkg.outputs.app_src }}
          APP: ${{ steps.pkg.outputs.app }}
        run: |
          set -euo pipefail
          APP_VSN=$(sed -n 's/.*{[[:space:]]*vsn[[:space:]]*,[[:space:]]*"\([^"]*\)".*/\1/p' "$APP_SRC" | head -1)
          echo "tag=$TAG  tag_vsn=$TAG_VSN  app_src=$APP_SRC  app_vsn=$APP_VSN"
          if [ "$TAG_VSN" != "$APP_VSN" ]; then
            echo "::error::Tag '$TAG' (version '$TAG_VSN') does not match ${APP_SRC} vsn '$APP_VSN'. Bump the .app.src vsn and re-tag."
            exit 1
          fi
          echo "Publishing ${APP} ${APP_VSN}"

      # STRICT, MANUALLY-GATED PUBLISH ORDER — erli18n FIRST, then the plugin.
      # When publishing the plugin, its required erli18n minor (the `~> X.Y`
      # constraint in apps/rebar3_erli18n/rebar.config {deps}) MUST already be
      # live on Hex. The reason is twofold: (1) the per-app build below resolves
      # `erli18n` from Hex into the plugin's lock, which is what lands it in the
      # published `requirements` (update_versions/2 keys on that lock entry —
      # rebar3_hex_build.erl:424-442) — if the required minor is not on Hex the
      # build cannot resolve it; and (2) a consumer installing the plugin against
      # an older erli18n would hit `undef` on erli18n_po:escape_string/1 (the
      # 0.5.0 export the plugin calls). We read the constraint from the plugin's
      # own rebar.config {deps} and query the Hex API for a matching erli18n
      # release, failing fast on out-of-order publishing — the ordered gate the
      # OTel exemplars do not encode. (erli18n's own tag skips this.)
      - name: Enforce erli18n-first publish order
        if: steps.pkg.outputs.app == 'rebar3_erli18n'
        run: |
          set -euo pipefail
          # Extract the erli18n requirement string, e.g. "~> 0.5", from the
          # plugin's rebar.config {deps}.
          REQ=$(sed -n 's/.*{[[:space:]]*erli18n[[:space:]]*,[[:space:]]*"\([^"]*\)".*/\1/p' \
                  apps/rebar3_erli18n/rebar.config | head -1)
          if [ -z "$REQ" ]; then
            echo "::error::Could not find an {erli18n, \"...\"} dep in apps/rebar3_erli18n/rebar.config."
            exit 1
          fi
          # The `~> X.Y` minor the plugin needs live on Hex (strip the operator).
          NEED_MINOR=$(printf '%s' "$REQ" | sed 's/[~>= ]//g')
          echo "Plugin requires erli18n '$REQ' (minor series '$NEED_MINOR') to be published first."
          # Ask Hex which erli18n versions exist. A matching X.Y.* release must be
          # present before the plugin may publish.
          RELEASES=$(curl -fsSL https://hex.pm/api/packages/erli18n \
                       | grep -o '"version":"[0-9][^"]*"' | sed 's/"version":"//;s/"//' || true)
          echo "Published erli18n versions on Hex:"
          echo "$RELEASES" | sed 's/^/  - /'
          if echo "$RELEASES" | grep -qE "^${NEED_MINOR//./\\.}\\."; then
            echo "erli18n ${NEED_MINOR}.x is live on Hex — safe to publish the plugin."
          else
            echo "::error::erli18n ${NEED_MINOR}.x is NOT yet published on Hex. Publish erli18n FIRST (push its erli18n-v${NEED_MINOR}.* tag, confirm it is live), then re-run this plugin publish."
            exit 1
          fi

      # Dry-run / build BEFORE publishing. Run FROM the app dir so the build
      # resolves the package's deps into a per-app lock — this is what lands the
      # sibling `erli18n` in the plugin's published `requirements` (see the header
      # comment). `rebar3 hex build package` writes the package tarball locally
      # and uploads NOTHING, catching metadata/file/requirement errors without
      # burning an immutable Hex version. In a single-app context `--app` is
      # unnecessary.
      #
      # `package` (not bare `build`) on purpose: bare `rebar3 hex build` also
      # builds the DOCS tarball, which runs EDoc and crashes on a Markdown
      # backtick in a `%%` comment (the same upstream bug gen_docs.sh routes
      # around) — exit 1 even though the package tarball is fine. Docs are built
      # and published separately below via gen_docs.sh + `--doc-dir`, so the dry
      # run validates only the package.
      - name: Build package tarball (dry-run, no upload)
        working-directory: apps/${{ steps.pkg.outputs.app }}
        run: rebar3 hex build package

      # Publish FROM the app dir, for the same lock-resolution reason as the build
      # above. This is the structural fix: an `--app NAME` publish from the
      # umbrella root would omit `erli18n` from the plugin's `requirements`
      # (the root lock has no sibling app).
      - name: Publish package to Hex.pm
        working-directory: apps/${{ steps.pkg.outputs.app }}
        env:
          HEX_API_KEY: ${{ secrets.HEX_API_KEY }}
        run: rebar3 hex publish package --repo hexpm --yes

      # Build the HTML docs from the native EEP-48 BEAM chunks. gen_docs.sh is
      # app-parameterized: it reads apps/$APP/rebar.config for the package's own
      # {ex_doc,...} block, resolves extras against apps/$APP/, and writes the
      # site to apps/$APP/doc. It calls the ex_doc escript directly, skipping the
      # vestigial EDoc step that crashes `rebar3 ex_doc` / `rebar3 hex publish
      # docs` on a Markdown backtick in a `%%` comment. (Run from the repo root;
      # the script takes the app name as its argument.)
      - name: Build docs (bypassing the EDoc bug)
        run: scripts/gen_docs.sh ${{ steps.pkg.outputs.app }}

      # Publish the pre-built doc/ directory directly. `--doc-dir` makes
      # rebar3_hex upload the given directory as-is instead of invoking a doc
      # provider, so the EDoc crash is never hit here either. Run FROM the app dir
      # (where gen_docs.sh wrote `doc/`); a single-app context needs no `--app`.
      - name: Publish docs to HexDocs
        working-directory: apps/${{ steps.pkg.outputs.app }}
        env:
          HEX_API_KEY: ${{ secrets.HEX_API_KEY }}
        run: rebar3 hex publish docs --repo hexpm --doc-dir doc --yes

      # Create the visible GitHub Release LAST — only after Hex publishing has
      # succeeded, so a failed publish never leaves a release for a version that
      # isn't on Hex. The body is the matching section of THAT package's own
      # CHANGELOG (apps/$APP/CHANGELOG.md, not the umbrella root CHANGELOG); if
      # that version has no section yet, fall back to GitHub's auto-generated
      # notes so the release is never empty.
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.pkg.outputs.tag }}
          APP_VSN: ${{ steps.pkg.outputs.vsn }}
          CHANGELOG: ${{ steps.pkg.outputs.changelog }}
          APP: ${{ steps.pkg.outputs.app }}
        run: |
          set -euo pipefail
          NOTES_FILE="$(mktemp)"
          # End the section at the next version heading, or — for the last/only
          # version in the file — at the trailing link-reference comment or the
          # `[x]: url` link definitions, so those never leak into the notes.
          awk -v ver="$APP_VSN" '
            $0 ~ "^## \\[" ver "\\]"     { flag = 1; next }
            flag && /^(## \[|<!--|\[)/   { flag = 0 }
            flag                         { print }
          ' "$CHANGELOG" > "$NOTES_FILE"
          # Mark as prerelease when the tag carries a pre-release suffix
          # (e.g. erli18n-v1.2.0-rc1 -> version 1.2.0-rc1).
          PRERELEASE=""
          case "$APP_VSN" in *-*) PRERELEASE="--prerelease" ;; esac
          if grep -q '[^[:space:]]' "$NOTES_FILE"; then
            echo "Using ${CHANGELOG} section for ${APP} ${APP_VSN} as release notes."
            gh release create "$TAG" --title "Release $TAG" --notes-file "$NOTES_FILE" --verify-tag $PRERELEASE
          else
            echo "No ${CHANGELOG} section for ${APP_VSN} — using auto-generated notes."
            gh release create "$TAG" --title "Release $TAG" --generate-notes --verify-tag $PRERELEASE
          fi
