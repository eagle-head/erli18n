name: CI

on:
  # CI runs AUTOMATICALLY only for the main branch (a push/merge to main).
  # Pull requests deliberately do NOT trigger CI: feature branches and draft
  # PRs would otherwise consume CI minutes on every push. Every non-main run is
  # therefore on-demand only, via workflow_dispatch ("Run workflow" in the
  # Actions tab) — i.e. it runs with explicit maintainer authorization, against
  # whichever branch is selected.
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    name: lint (fast quality gate)
    # Pinned per GitHub Actions docs recommendation
    # (https://docs.github.com/en/actions/using-jobs/choosing-the-runner-for-a-job):
    # explicit version avoids `ubuntu-latest` drift when GitHub flips
    # the alias. Also required for accurate ImageOS resolution under
    # `act` (nektos/act derives ImageOS from the platform key via
    # `ubuntu-(\d+\.\d+)` regex; `ubuntu-latest` does not match).
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - name: Set up Erlang/OTP
        uses: erlef/setup-beam@v1
        with:
          otp-version: '28'
          rebar3-version: '3.24'

      - name: Cache rebar3 build artifacts
        uses: actions/cache@v5
        with:
          path: |
            _build
            ~/.cache/rebar3
          key: ${{ runner.os }}-otp28-lint-${{ hashFiles('rebar.lock', 'rebar.config') }}
          restore-keys: |
            ${{ runner.os }}-otp28-lint-

      - name: Run quality gate (fast)
        run: bin/quality-gate.sh --fast

  test:
    name: test (OTP ${{ matrix.otp }} on ${{ matrix.os }})
    # Runner OS is pinned per-matrix-entry because the `erlef/setup-beam`
    # compatibility matrix (https://github.com/erlef/setup-beam#compatibility-between-operating-system-and-erlangotp)
    # ties OTP binary availability to the runner's libssl ABI:
    #   * OTP 27/28 — Ubuntu 24.04 (libssl3t64).
    # OTP 25.3 / 26 are no longer supported: the native -doc/-moduledoc
    # attributes (EEP-59) require OTP 27+ to compile.
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - otp: '27'
            rebar3: '3.24'
            os: 'ubuntu-24.04'
          - otp: '28'
            rebar3: '3.24'
            os: 'ubuntu-24.04'
    steps:
      - uses: actions/checkout@v6

      - name: Install GNU gettext (msgfmt for parity oracle)
        run: |
          sudo apt-get update
          sudo apt-get install -y gettext
          msgfmt --version | head -1

      - name: Generate UTF-8 locales (pt_BR, ru_RU) for plural/parity suites
        run: |
          sudo apt-get install -y locales
          sudo sed -i 's/^# *\(pt_BR.UTF-8 UTF-8\)/\1/; s/^# *\(ru_RU.UTF-8 UTF-8\)/\1/' /etc/locale.gen
          sudo locale-gen pt_BR.UTF-8 ru_RU.UTF-8
          locale -a | grep -E 'pt_BR|ru_RU'

      - name: Set up Erlang/OTP
        uses: erlef/setup-beam@v1
        with:
          otp-version: ${{ matrix.otp }}
          rebar3-version: ${{ matrix.rebar3 }}

      - name: Cache rebar3 build artifacts
        uses: actions/cache@v5
        with:
          path: |
            _build
            ~/.cache/rebar3
          key: ${{ runner.os }}-otp${{ matrix.otp }}-test-${{ hashFiles('rebar.lock', 'rebar.config') }}
          restore-keys: |
            ${{ runner.os }}-otp${{ matrix.otp }}-test-

      - name: Compile (warnings_as_errors)
        run: rebar3 compile

      - name: Common Test + coverage
        run: rebar3 do ct --cover, cover

      - name: Upload CT logs on failure
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: ct-logs-otp${{ matrix.otp }}
          path: _build/test/logs/
          retention-days: 7

  dialyzer:
    name: dialyzer
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - name: Set up Erlang/OTP
        uses: erlef/setup-beam@v1
        with:
          otp-version: '28'
          rebar3-version: '3.24'

      - name: Cache Dialyzer PLT + rebar3 build
        uses: actions/cache@v5
        with:
          path: |
            _build/default/rebar3_*_plt
            _build
            ~/.cache/rebar3
          key: ${{ runner.os }}-otp28-plt-${{ hashFiles('rebar.config', 'rebar.lock') }}
          restore-keys: |
            ${{ runner.os }}-otp28-plt-

      - name: Dialyzer
        run: rebar3 dialyzer
