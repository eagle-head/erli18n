name: CI

# Give each run a descriptive title in the Actions list instead of a bare "CI":
# a PR run shows the PR number + source branch; a push/dispatch run shows the
# ref and the event. (GitHub Actions "run-name".)
run-name: >-
  CI · ${{ github.event_name == 'pull_request' && format('PR #{0}', github.event.pull_request.number) || format('{0} · {1}', github.ref_name, github.event_name) }}

on:
  # CI runs on every push to main and on every pull request targeting main,
  # plus on demand via workflow_dispatch. Pull requests from forks are gated by
  # the repository's "Require approval for all outside collaborators" setting, so
  # an external PR never runs CI without explicit maintainer approval.
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  gate:
    name: full gate (OTP ${{ matrix.otp }})
    # The gate runs INSIDE the official erlang:NN image, via docker-compose.yml —
    # exactly what `make gate-full` does locally, so CI and the local pre-push
    # gate are the SAME environment down to the rebar3 the image maintainers ship
    # for each OTP. This removes erlef/setup-beam and its separately-pinned rebar3,
    # which drifted from the images and broke OTP 29 (rebar3 3.24's precompiled
    # BEAMs do not load on OTP 29). gettext, the pt_BR/ru_RU UTF-8 locales, ELP,
    # and actionlint are all baked into the image by docker/erli18n-otp.Dockerfile,
    # so there are no per-tool install steps here.
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        otp: ['27', '28', '29']
    env:
      # Deterministic Compose project name so the per-OTP build volume has a
      # predictable name for the CT-log extraction on failure below.
      COMPOSE_PROJECT_NAME: erli18n-gate
    steps:
      - uses: actions/checkout@v6

      # The gate goes through the SAME Makefile target a developer runs locally —
      # `make gate-otp OTP=${{ matrix.otp }}` reproduces this job byte for byte:
      # build this OTP's image from the official erlang:NN base (--pull = latest
      # minor), extract the GNU gettext oracle once, then run the full gate inside
      # the image (compile, xref, erlfmt, elvis, hank, elp lint, dialyzer,
      # eqwalize, ct + cover, the hard-fail gettext parity step, catalog). ONE
      # source of truth (Makefile + docker-compose.yml) for local and remote.
      - name: Run the full gate for OTP ${{ matrix.otp }}
        run: make gate-otp OTP=${{ matrix.otp }}

      # CT logs live on the per-OTP build volume (REBAR_BASE_DIR=/rebar/otpNN),
      # off the host workspace; on failure, copy them out for the artifact.
      - name: Collect CT logs on failure
        if: failure()
        run: |
          mkdir -p ct-logs
          docker run --rm \
            -v "erli18n-gate_gate-rebar-otp${{ matrix.otp }}:/rebar:ro" \
            -v "$PWD/ct-logs:/out" \
            alpine sh -c 'cp -r /rebar/otp${{ matrix.otp }}/test/logs/. /out/ 2>/dev/null || true'

      - name: Upload CT logs on failure
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: ct-logs-otp${{ matrix.otp }}
          path: ct-logs/
          if-no-files-found: ignore
          retention-days: 7
