# Local OTP test matrix for erli18n.
#
# This file is SEPARATE from compose.yml (which exists only to bootstrap the
# `act` local-CI runner image/volumes — see that file's header). This one is
# meant to be `up`d directly: it runs the Common Test suite against the two
# supported OTP releases inside the official `erlang` images, with the C
# locales the parity/plural suites need pre-generated.
#
# Usage:
#   docker compose -f compose.matrix.yml up --abort-on-container-exit
#   docker compose -f compose.matrix.yml up --abort-on-container-exit otp27
#   docker compose -f compose.matrix.yml run --rm otp28
#
# Each service:
#   * uses the official erlang:27 / erlang:28 image (rebar3 + OTP preinstalled);
#   * apt-installs gettext (msgfmt, for erli18n_parity_SUITE's oracle path) and
#     locales, then generates pt_BR.UTF-8 and ru_RU.UTF-8 (the locales exercised
#     by the plural/parity suites);
#   * keeps its rebar3 build artifacts in a NAMED VOLUME via REBAR_BASE_DIR, so
#     the host's `_build` is never touched and the two OTP builds never collide;
#   * bind-mounts the project read-write at /work;
#   * best-effort installs ELP (matching the container's OTP major) so the
#     gradual-typing / IDE-diagnostic steps run, then executes the FULL quality
#     gate `bin/quality-gate.sh --full` (compile, xref, erlfmt, elvis, hank, elp
#     lint, dialyzer, eqwalize-all, ct --cover/cover, catalog freshness) — the
#     maximum runnable in-container, not just compile + ct.
#
# The project is mounted (not copied), so REBAR_BASE_DIR must point OUTSIDE the
# mount — otherwise the two containers would clobber each other's _build under
# the shared bind mount. Each service gets its own named volume mounted at a
# private base dir.

x-otp-test: &otp-test
  working_dir: /work
  volumes:
    - .:/work
  # `rebar3 compile` then the CT run with coverage. localedef/locale-gen and the
  # apt installs happen first so the parity oracle and locale-dependent suites
  # have everything they need. `set -e` makes any failing step abort the service
  # (and, with --abort-on-container-exit, the whole compose run).
  command:
    - bash
    - -euxc
    - |
      export DEBIAN_FRONTEND=noninteractive
      apt-get update
      apt-get install -y --no-install-recommends gettext locales curl ca-certificates tar
      # Generate the UTF-8 locales the parity/plural suites depend on.
      sed -i 's/^# *\(pt_BR.UTF-8 UTF-8\)/\1/; s/^# *\(ru_RU.UTF-8 UTF-8\)/\1/' /etc/locale.gen
      locale-gen pt_BR.UTF-8 ru_RU.UTF-8
      locale -a | grep -E 'pt_BR|ru_RU'
      msgfmt --version | head -1
      # Install ELP matching THIS container's OTP major (OTP_MAJOR is set per
      # service in `environment:` below — NOT detected at runtime, which proved
      # unreliable). The full gate REQUIRES elp, so a missing/failed install must
      # fail loudly. Real asset names: elp-linux-x86_64-unknown-linux-gnu-otp-<major>[.minor].tar.gz
      # `$$` keeps these expansions for the CONTAINER's bash: docker compose
      # interpolates a single `$` from the HOST env at parse time (-> empty),
      # which is exactly why OTP_MAJOR came out blank in earlier runs.
      ELP_URL=$$(curl -fsSL https://api.github.com/repos/WhatsApp/erlang-language-platform/releases/latest \
        | grep -oE '"browser_download_url": *"[^"]+"' | cut -d'"' -f4 \
        | grep -E "x86_64-unknown-linux-gnu-otp-$${OTP_MAJOR}[.0-9]*\.tar\.gz$$" | head -1)
      echo "ELP asset for OTP $${OTP_MAJOR}: $${ELP_URL:-<none found>}"
      curl -fsSL "$${ELP_URL}" -o /tmp/elp.tar.gz
      tar -xzf /tmp/elp.tar.gz -C /usr/local/bin
      chmod +x /usr/local/bin/elp
      elp version
      # Run the FULL quality gate inside the container — the maximum runnable
      # here (compile, xref, erlfmt, elvis, hank, elp lint, dialyzer,
      # eqwalize-all, ct --cover/cover, catalog freshness), not just compile+ct.
      bash bin/quality-gate.sh --full

services:
  otp27:
    <<: *otp-test
    image: erlang:27
    container_name: erli18n-otp27
    environment:
      # Isolated build dir per service, on a named volume — host _build untouched.
      REBAR_BASE_DIR: /rebar/otp27
      # Drives the ELP asset selection in the shared command (otp-27.x build).
      OTP_MAJOR: '27'
    volumes:
      - .:/work
      - rebar-otp27:/rebar/otp27

  otp28:
    <<: *otp-test
    image: erlang:28
    container_name: erli18n-otp28
    environment:
      REBAR_BASE_DIR: /rebar/otp28
      # Drives the ELP asset selection in the shared command (otp-28 build).
      OTP_MAJOR: '28'
    volumes:
      - .:/work
      - rebar-otp28:/rebar/otp28

volumes:
  rebar-otp27:
  rebar-otp28:
